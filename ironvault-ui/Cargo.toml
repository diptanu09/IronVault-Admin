[package]
name = "ironvault-ui"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
tokio = { version = "1.35", features = ["full"] }
slint = { version = "1.5", features = ["backend-winit", "renderer-skia"] }
ironvault-core = { path = "../ironvault-core" }
ironvault-db = { path = "../ironvault-db" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
log = "0.4"
env_logger = "0.11"
thiserror = "1.0"

[dev-dependencies]
tokio-test = "0.4"
