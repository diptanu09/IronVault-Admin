#STREAMING_CHUNK:Configuring cargo build metadata and dependencies...

[package]
name = "ironvault-ui"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]

#Links our shared backend cryptographic and database core

ironvault-core = { path = "../ironvault-core" }

#High-performance desktop UI engine

slint = "1.17.0"

#Multi-threaded runtime for async database actions

tokio = { version = "1.0", features = ["full"] }

[build-dependencies]

#Compiles your .slint markup layout directly during the Cargo build cycle

slint-build = "1.17.0"